<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImpulseCheck – Record Purchase</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .page-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0;
      max-width: 680px;
      margin: 0 auto;
      overflow: hidden;
    }
    .page-card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      padding: 24px 28px 20px;
      border-bottom: 1.5px solid var(--border);
    }
    .page-card-body { padding: 24px 28px 28px; }
    .peso-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .peso-input-wrap .peso-icon {
      position: absolute;
      left: 14px;
      display: flex;
      align-items: center;
      color: var(--text-muted);
    }
    .peso-input-wrap input {
      width: 100%;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: var(--radius-sm);
      padding: 13px 14px 13px 42px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .peso-input-wrap input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(46,170,126,0.12);
      background: #fff;
    }
    .btn-analyze { margin-top: 8px; }
    @media (max-width: 640px) {
      .page-card-title { padding: 18px 16px 14px; font-size: 17px; }
      .page-card-body  { padding: 16px 16px 20px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <img src="assets/logo.png" alt="" style="height:56px;width:auto;object-fit:contain;display:block;" />
    <div class="topbar-right">
      <button class="home-btn" onclick="window.location.href='dashboard.html'" title="Dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      </button>
      <a href="help.html" class="home-btn" title="Help & FAQ" style="text-decoration:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </a>
      <a href="profile.html" class="avatar" id="topbar-avatar">M</a>
    </div>
  </header>

  <div class="main-content">
    <div class="page-card">
      <div class="page-card-title">Record Purchase</div>
      <div class="page-card-body">

        <div id="error-banner" class="error-banner" style="display:none"></div>

        <div class="field">
          <label>Item Name</label>
          <div class="input-wrap">
            <span class="ic">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            </span>
            <input type="text" id="item-name" placeholder="e.g. Coffee" />
          </div>
        </div>

        <div class="field">
          <label>Price</label>
          <div class="peso-input-wrap">
            <span class="peso-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <text x="2" y="18" font-family="Nunito,sans-serif" font-size="17" font-weight="800" fill="#718096" id="price-symbol">₱</text>
              </svg>
            </span>
            <input type="number" id="item-price" placeholder="0.00" min="0" step="0.01" />
          </div>
        </div>

        <div class="field">
          <label>Category</label>
          <select id="item-category">
            <option value="" disabled selected>Select a category</option>
          </select>
        </div>

        <div class="field">
          <label>Reason for Purchase</label>
          <select id="item-reason">
            <option value="" disabled selected>Select a reason</option>
            <option value="necessity">Necessity / Essential</option>
            <option value="want">Want / Desire</option>
            <option value="impulse">Impulse / Unplanned</option>
            <option value="gift">Gift for someone</option>
            <option value="work">Work / Business related</option>
            <option value="sale">On sale / Discount deal</option>
          </select>
        </div>

        <div class="field">
          <label>Emotion</label>
          <select id="item-emotion">
            <option value="" disabled selected>Select an emotion</option>
            <option value="happy">Happy / Excited</option>
            <option value="stressed">Stressed / Anxious</option>
            <option value="bored">Bored</option>
            <option value="sad">Sad / Down</option>
            <option value="neutral">Neutral / Calm</option>
            <option value="peer">Peer pressure</option>
          </select>
        </div>

        <button class="btn btn-primary btn-analyze" onclick="analyzePurchase()">Analyze Purchase</button>
      </div>
    </div>
  </div>

  <script src="currency.js"></script>
  <script>
    const ALL_CATS  = ['Food','Transport','Shopping','Entertainment','Health','Bills','Others'];
    const savedCats = JSON.parse(localStorage.getItem('ic_categories') || 'null') || ALL_CATS;
    const catSelect = document.getElementById('item-category');
    savedCats.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat; opt.textContent = cat;
      catSelect.appendChild(opt);
    });
    if (!savedCats.includes('Others')) {
      const opt = document.createElement('option');
      opt.value = 'Others'; opt.textContent = 'Others';
      catSelect.appendChild(opt);
    }

    const symEl = document.getElementById('price-symbol');
    if (symEl) symEl.textContent = getCurrencySymbol();

    function analyzePurchase() {
      const name     = document.getElementById('item-name').value.trim();
      const price    = parseFloat(document.getElementById('item-price').value);
      const category = document.getElementById('item-category').value;
      const reason   = document.getElementById('item-reason').value;
      const emotion  = document.getElementById('item-emotion').value;
      const banner   = document.getElementById('error-banner');

      if (!name || !price || price <= 0) {
        banner.textContent = 'Please enter a name and valid price.';
        banner.style.display = 'block';
        return;
      }
      if (!category) {
        banner.textContent = 'Please select a category.';
        banner.style.display = 'block';
        return;
      }
      banner.style.display = 'none';

      sessionStorage.setItem('ic_pending', JSON.stringify({ name, price, category, reason, emotion }));
      window.location.href = 'ai-recommendation.html';
    }
  </script>
  <script src="notifications.js"></script>
  <script src="shared-avatar.js"></script>
</body>
</html>
