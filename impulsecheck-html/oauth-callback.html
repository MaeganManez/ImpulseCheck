<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImpulseCheck – Signing in...</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .cb-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--bg);
    }
    .cb-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 48px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .cb-card h2 { font-size: 18px; font-weight: 700; color: var(--text); margin: 16px 0 8px; }
    .cb-card p  { font-size: 14px; color: var(--text-muted); }
    .cb-error   { color: var(--red); font-weight: 600; }
  </style>
</head>
<body>
  <div class="cb-page">
    <img src="assets/logo.png" alt="" style="height:80px;width:auto;object-fit:contain;" />
    <div class="cb-card">
      <div class="spinner"></div>
      <h2 id="cb-title">Signing you in…</h2>
      <p id="cb-msg">Please wait a moment.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    (async () => {
      const supabaseClient = window.supabase.createClient(window.IC_SUPABASE_URL, window.IC_SUPABASE_ANON_KEY);

      const { data: { session }, error } = await supabaseClient.auth.getSession();

      if (error || !session) {
        document.getElementById('cb-title').textContent = 'Sign-in failed';
        document.getElementById('cb-msg').innerHTML = '<span class="cb-error">Google sign-in was cancelled or failed.<br/>Please try again.</span>';
        setTimeout(() => window.location.href = 'login.html', 3000);
        return;
      }

      try {
        const res  = await fetch(`${window.IC_API_BASE}/auth/google-supabase`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ access_token: session.access_token }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Auth failed');

        localStorage.removeItem('ic_activity');
        localStorage.removeItem('ic_budget');
        localStorage.removeItem('ic_notifications');
        localStorage.removeItem('ic_categories');
        localStorage.removeItem('ic_budget_data');

        localStorage.setItem('ic_token',    data.token);
        localStorage.setItem('ic_user',     JSON.stringify(data.user));
        localStorage.setItem('ic_currency', data.user.currency || 'PHP');

        sessionStorage.setItem('toast_msg', '✅ Signed in with Google!');
        window.location.href = 'dashboard.html';
      } catch (err) {
        document.getElementById('cb-title').textContent = 'Sign-in failed';
        document.getElementById('cb-msg').innerHTML = `<span class="cb-error">${err.message}</span>`;
        setTimeout(() => window.location.href = 'login.html', 3000);
      }
    })();
  </script>
</body>
</html>
