<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImpulseCheck – Log In</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .auth-page { min-height:100vh; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 16px; }
    .auth-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:40px 44px 36px; width:100%; max-width:500px; }
    .field { margin-bottom:16px; }
    .input-wrap { position:relative; display:flex; align-items:center; }
    .input-wrap .ic { position:absolute; left:14px; color:#8fa3b1; display:flex; align-items:center; pointer-events:none; }
    .input-wrap input {
      width:100%; background:var(--input-bg); border:1.5px solid var(--input-border);
      border-radius:var(--radius-sm); padding:13px 42px;
      font-size:14px; font-family:'Nunito',sans-serif; color:var(--text); outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input::placeholder { color:var(--text-light); }
    .input-wrap input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(46,170,126,0.12); background:#fff; }
    .toggle-pw { position:absolute; right:12px; background:none; border:none; cursor:pointer; color:var(--text-light); padding:4px; display:flex; align-items:center; }
    .toggle-pw:hover { color:var(--text-muted); }
    .forgot-row { text-align:right; margin-top:-6px; margin-bottom:14px; }
    .forgot-link { font-size:12px; color:var(--green); font-weight:600; }
    .forgot-link:hover { text-decoration:underline; }
    .divider-text { display:flex; align-items:center; gap:10px; color:var(--text-muted); font-size:13px; margin:16px 0; }
    .divider-text::before, .divider-text::after { content:''; flex:1; height:1px; background:var(--border); }
    .signup-row { text-align:center; font-size:13px; color:var(--text-muted); margin-top:14px; }
    .signup-row a { color:var(--blue-link); font-weight:700; }

    .btn-google {
      width:100%; display:flex; align-items:center; justify-content:center;
      gap:10px; padding:13px 16px; border-radius:var(--radius-sm);
      border:1.5px solid var(--border); background:var(--card); color:var(--text);
      font-size:14px; font-weight:700; font-family:'Nunito',sans-serif;
      cursor:pointer; transition:background 0.15s, border-color 0.15s, box-shadow 0.15s;
      text-decoration:none;
    }
    .btn-google:hover { background:var(--input-bg); border-color:#4285f4; box-shadow:0 2px 8px rgba(66,133,244,0.15); }

    /* ── TABS ── */
    .login-tabs { display:flex; gap:8px; margin-bottom:22px; }
    .login-tab {
      flex:1; padding:10px 12px; border-radius:var(--radius-sm);
      border:1.5px solid var(--border); background:var(--input-bg);
      color:var(--text-muted); font-size:13px; font-weight:700;
      font-family:inherit; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:6px;
      transition:all 0.15s;
    }
    .login-tab.active { border-color:var(--green); background:var(--green-light); color:var(--green); }
    .login-tab:hover:not(.active) { border-color:var(--green); color:var(--green); }

    /* ── QR PANEL ── */
    .qr-panel { display:none; }
    .qr-panel.visible { display:block; }

    .qr-upload-zone {
      border:2px dashed var(--border); border-radius:var(--radius-sm);
      padding:28px 16px; text-align:center; cursor:pointer;
      position:relative; transition:border-color 0.2s, background 0.2s;
      margin-bottom:14px;
    }
    .qr-upload-zone:hover { border-color:var(--green); background:rgba(46,170,126,0.04); }
    .qr-upload-zone input {
      position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
    }
    .qr-upload-zone .uz-icon { font-size:36px; margin-bottom:10px; }
    .qr-upload-zone p { font-size:13px; color:var(--text-muted); margin:0; }
    .qr-upload-zone p strong { color:var(--green); }

    #qr-preview {
      width:100%; max-height:200px; object-fit:contain;
      border-radius:var(--radius-sm); border:1px solid var(--border);
      margin-bottom:12px; display:none;
    }

    .btn-qr-login {
      width:100%; padding:13px; border-radius:var(--radius-sm);
      background:var(--green); color:#fff; border:none;
      font-size:14px; font-weight:800; font-family:inherit;
      cursor:pointer; transition:opacity 0.2s; display:none; margin-bottom:10px;
    }
    .btn-qr-login:hover { opacity:0.88; }

    .qr-status {
      font-size:13px; font-weight:700; padding:10px 14px;
      border-radius:var(--radius-sm); margin-bottom:10px;
      display:none; text-align:center;
    }
    .qr-status.visible { display:block; }
    .qr-status.loading { background:#e8f4fd; color:#1a6b8a; border:1px solid #b3d9ee; }
    .qr-status.success { background:var(--green-light); color:var(--green); border:1px solid var(--green); }
    .qr-status.error   { background:#fce4e4; color:#e53935; border:1px solid #e53935; }

    .qr-hint {
      text-align:center; font-size:12px; color:var(--text-muted);
      margin-top:4px; line-height:1.6;
    }
    .qr-hint a { color:var(--green); font-weight:700; }

    @media (max-width:560px) { .auth-card { padding:28px 20px 24px; } }
  </style>
</head>
<body>
  <div class="auth-page">
    <img src="assets/logo.png" alt="" style="height:90px;width:auto;object-fit:contain;display:block;margin-bottom:28px;" />

    <div class="auth-card">
      <div id="error-banner" class="error-banner" style="display:none"></div>

      <!-- Google Sign In -->
      <button type="button" class="btn-google" id="btn-google" onclick="signInWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider-text">or sign in with</div>

      <!-- ── TABS ── -->
      <div class="login-tabs">
        <button class="login-tab active" id="tab-email" onclick="switchTab('email')">Email</button>
        <button class="login-tab" id="tab-qr" onclick="switchTab('qr')">Login with QR</button>
      </div>

      <!-- ── EMAIL PANEL ── -->
      <div id="email-panel">
        <div class="field">
          <div class="input-wrap">
            <span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg></span>
            <input type="email" id="email" placeholder="Email" autocomplete="email" onkeydown="if(event.key==='Enter')handleLogin()" />
          </div>
        </div>
        <div class="field">
          <div class="input-wrap">
            <span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()" />
            <button class="toggle-pw" type="button" onclick="togglePw()" tabindex="-1">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="forgot-row">
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>
        <button class="btn btn-primary" onclick="handleLogin()">Log In</button>
      </div>

      <!-- ── QR PANEL ── -->
      <div class="qr-panel" id="qr-panel">
        <img id="qr-preview" alt="QR preview" />

        <div class="qr-upload-zone" id="qr-upload-zone">
          <input type="file" id="qr-file-input" accept="image/*" onchange="handleQRImage(event)" />
          <div class="uz-icon"></div>
          <p><strong>Upload your QR code</strong></p>
          <p style="margin-top:4px;">Tap to choose from gallery or take a photo</p>
        </div>

        <div class="qr-status" id="qr-status"></div>

        <button class="btn-qr-login" id="btn-qr-login" onclick="loginWithQR()">
          Log In with QR
        </button>

        <p class="qr-hint">
          Don't have a QR code yet?
          <a href="register.html">Register</a> or log in with email,<br/>
          then go to <strong>Profile</strong> to get your QR.
        </p>
      </div>

      <div class="signup-row">Don't have an account? <a href="register.html">Sign Up</a></div>
    </div>
  </div>

  <!-- jsQR for reading QR codes from images -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    let scannedQRToken = null;

    /* ── SUPABASE GOOGLE LOGIN ── */
    const supabaseClient = window.supabase.createClient(window.IC_SUPABASE_URL, window.IC_SUPABASE_ANON_KEY);

    async function signInWithGoogle() {
      const btn = document.getElementById('btn-google');
      btn.disabled = true;
      btn.textContent = 'Redirecting…';
      await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.IC_SUPABASE_REDIRECT_URL },
      });
    }

    /* ── EMAIL LOGIN ── */
    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Please fill in all fields.'); return; }
      try {
        const res  = await fetch('https://impulsecheck-backend.onrender.com/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          if (data.needs_verification) {
            sessionStorage.setItem('otp_user_id', data.user_id);
            sessionStorage.setItem('otp_email',   email);
            window.location.href = 'verify-otp.html';
            return;
          }
          showError(data.error); return;
        }
        loginSuccess(data.token, data.user);
      } catch (err) {
        showError('Cannot connect to server. Make sure the backend is running.');
      }
    }

    function loginSuccess(token, user) {
      localStorage.removeItem('ic_activity');
      localStorage.removeItem('ic_budget');
      localStorage.removeItem('ic_notifications');
      localStorage.removeItem('ic_categories');
      localStorage.removeItem('ic_budget_data');
      localStorage.setItem('ic_token',    token);
      localStorage.setItem('ic_user',     JSON.stringify(user));
      localStorage.setItem('ic_currency', user.currency || 'PHP');
      window.location.href = 'dashboard.html';
    }

    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      const b = document.getElementById('error-banner');
      b.textContent = msg; b.style.display = 'block';
    }

    /* ── TABS ── */
    function switchTab(tab) {
      document.getElementById('tab-email').classList.toggle('active', tab === 'email');
      document.getElementById('tab-qr').classList.toggle('active', tab === 'qr');
      document.getElementById('email-panel').style.display = tab === 'email' ? 'block' : 'none';
      document.getElementById('qr-panel').classList.toggle('visible', tab === 'qr');
      document.getElementById('error-banner').style.display = 'none';
    }

    /* ── QR IMAGE HANDLING ── */
    function handleQRImage(evt) {
      const file = evt.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        // Show preview
        const preview = document.getElementById('qr-preview');
        preview.src = e.target.result;
        preview.style.display = 'block';
        document.getElementById('qr-upload-zone').style.display = 'none';

        // Decode QR from image
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width  = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height);

          if (code) {
            // Extract qr token from URL
            try {
              const url    = new URL(code.data);
              const token  = url.searchParams.get('qr');
              if (token) {
                scannedQRToken = token;
                setQRStatus('success', 'QR code detected! Tap the button below to log in.');
                document.getElementById('btn-qr-login').style.display = 'block';
              } else {
                setQRStatus('error', 'This QR code is not an ImpulseCheck login QR.');
              }
            } catch {
              setQRStatus('error', 'Could not read QR code data.');
            }
          } else {
            setQRStatus('error', 'No QR code found in this image. Try a clearer photo.');
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    async function loginWithQR() {
      if (!scannedQRToken) return;
      setQRStatus('loading', 'Verifying QR code…');
      document.getElementById('btn-qr-login').disabled = true;

      try {
        const res  = await fetch('https://impulsecheck-backend.onrender.com/api/qrauth/verify', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ qrToken: scannedQRToken }),
        });
        const data = await res.json();
        if (!res.ok) {
          setQRStatus('error', '❌ ' + (data.error || 'QR login failed.'));
          document.getElementById('btn-qr-login').disabled = false;
          return;
        }
        setQRStatus('success', 'Logged in! Redirecting…');
        setTimeout(() => loginSuccess(data.token, data.user), 800);
      } catch (err) {
        setQRStatus('error', 'Cannot connect to server.');
        document.getElementById('btn-qr-login').disabled = false;
      }
    }

    function setQRStatus(type, msg) {
      const el = document.getElementById('qr-status');
      el.className = 'qr-status visible ' + type;
      el.textContent = msg;
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const qrParam = params.get('qr');

      // Auto-login from saved device QR token
      const deviceQRToken = localStorage.getItem('ic_qr_token');
      if (deviceQRToken && !qrParam) {
        switchTab('qr');
        document.getElementById('qr-upload-zone').style.display = 'none';
        setQRStatus('loading', 'Logging in with your saved QR…');
        document.getElementById('btn-qr-login').style.display = 'none';
        try {
          const res  = await fetch(`${window.IC_API_BASE || 'https://impulsecheck-backend.onrender.com/api'}/qrauth/verify`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ qrToken: deviceQRToken }),
          });
          const data = await res.json();
          if (!res.ok) {
            // Token expired — clear it and let user log in normally
            localStorage.removeItem('ic_qr_token');
            setQRStatus('error', 'Quick login expired. Please log in again.');
            document.getElementById('qr-upload-zone').style.display = 'block';
            return;
          }
          setQRStatus('success', 'Logged in! Redirecting…');
          // Refresh stored token with new one if returned
          if (data.qrToken) localStorage.setItem('ic_qr_token', data.qrToken);
          setTimeout(() => loginSuccess(data.token, data.user), 600);
        } catch {
          setQRStatus('error', 'Cannot connect to server.');
          document.getElementById('qr-upload-zone').style.display = 'block';
        }
        return;
      }

      // Manual QR scan from URL param
      if (qrParam) {
        switchTab('qr');
        scannedQRToken = qrParam;
        setQRStatus('success', 'QR code detected! Tap the button below to log in.');
        document.getElementById('btn-qr-login').style.display = 'block';
        document.getElementById('qr-upload-zone').style.display = 'none';
      }
    });
  </script>
</body>
</html>
