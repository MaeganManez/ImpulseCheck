<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ImpulseCheck – Log In</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .auth-page { min-height:100vh; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 16px; }
    .auth-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:40px 44px 36px; width:100%; max-width:500px; }
    .field { margin-bottom:16px; }
    .input-wrap { position:relative; display:flex; align-items:center; }
    .input-wrap .ic { position:absolute; left:14px; color:#8fa3b1; display:flex; align-items:center; pointer-events:none; }
    .input-wrap input {
      width:100%; background:var(--input-bg); border:1.5px solid var(--input-border);
      border-radius:var(--radius-sm); padding:13px 42px;
      font-size:14px; font-family:'Nunito',sans-serif; color:var(--text); outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input::placeholder { color:var(--text-light); }
    .input-wrap input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(46,170,126,0.12); background:#fff; }
    .toggle-pw { position:absolute; right:12px; background:none; border:none; cursor:pointer; color:var(--text-light); padding:4px; display:flex; align-items:center; }
    .toggle-pw:hover { color:var(--text-muted); }
    .forgot-row { text-align:right; margin-top:-6px; margin-bottom:14px; }
    .forgot-link { font-size:12px; color:var(--green); font-weight:600; }
    .forgot-link:hover { text-decoration:underline; }
    .divider-text { display:flex; align-items:center; gap:10px; color:var(--text-muted); font-size:13px; margin:16px 0; }
    .divider-text::before, .divider-text::after { content:''; flex:1; height:1px; background:var(--border); }
    .signup-row { text-align:center; font-size:13px; color:var(--text-muted); margin-top:14px; }
    .signup-row a { color:var(--blue-link); font-weight:700; }

    /* Google button */
    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 13px 16px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: var(--card); color: var(--text);
      font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif;
      cursor: pointer; transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      text-decoration: none;
    }
    .btn-google:hover { background: var(--input-bg); border-color: #4285f4; box-shadow: 0 2px 8px rgba(66,133,244,0.15); }

    /* ── LOGIN METHOD TABS ── */
    .login-tabs {
      display: flex; gap: 8px; margin-bottom: 22px;
    }
    .login-tab {
      flex: 1; padding: 10px 12px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: var(--input-bg);
      color: var(--text-muted); font-size: 13px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.15s;
    }
    .login-tab.active { border-color: var(--green); background: var(--green-light); color: var(--green); }
    .login-tab:hover:not(.active) { border-color: var(--green); color: var(--green); }

    /* ── QR PANEL ── */
    .qr-panel { display: none; text-align: center; }
    .qr-panel.visible { display: block; }

    .qr-box {
      background: var(--input-bg); border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 24px 16px; margin-bottom: 14px;
    }
    .qr-box img {
      width: 180px; height: 180px; border-radius: 8px;
      display: block; margin: 0 auto 12px;
    }
    .qr-box .qr-placeholder {
      width: 180px; height: 180px; border-radius: 8px;
      background: var(--border); display: flex; align-items: center;
      justify-content: center; margin: 0 auto 12px;
      font-size: 36px;
    }
    .qr-instruction {
      font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 4px;
    }
    .qr-instruction strong { color: var(--text); }

    .qr-status {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 13px; font-weight: 700; padding: 10px 14px;
      border-radius: var(--radius-sm); margin-bottom: 14px;
    }
    .qr-status.pending  { background: #fff8e1; color: #e68a00; border: 1px solid #f0c060; }
    .qr-status.approved { background: var(--green-light); color: var(--green); border: 1px solid var(--green); }
    .qr-status.expired  { background: #fce4e4; color: #e53935; border: 1px solid #e53935; }

    .qr-timer {
      font-size: 12px; color: var(--text-muted); margin-bottom: 14px;
    }
    .qr-timer span { font-weight: 700; color: var(--text); }

    .btn-refresh-qr {
      width: 100%; padding: 11px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: var(--input-bg);
      color: var(--text-muted); font-size: 13px; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all 0.15s;
    }
    .btn-refresh-qr:hover { border-color: var(--green); color: var(--green); }

    @media (max-width:560px) { .auth-card { padding:28px 20px 24px; } }
  </style>
</head>
<body>
  <div class="auth-page">
    <img src="assets/logo.png" alt="" style="height:90px;width:auto;object-fit:contain;display:block;margin-bottom:28px;" />

    <div class="auth-card">
      <div id="error-banner" class="error-banner" style="display:none"></div>

      <!-- Google Sign In -->
      <a href="https://impulsecheck-backend.onrender.com/auth/google" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continue with Google
      </a>

      <div class="divider-text">or sign in with</div>

      <!-- ── TABS ── -->
      <div class="login-tabs">
        <button class="login-tab active" id="tab-email" onclick="switchTab('email')">✉️ Email</button>
        <button class="login-tab" id="tab-qr" onclick="switchTab('qr')">📱 QR Code</button>
      </div>

      <!-- ── EMAIL PANEL ── -->
      <div id="email-panel">
        <div class="field">
          <div class="input-wrap">
            <span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg></span>
            <input type="email" id="email" placeholder="Email" autocomplete="email" onkeydown="if(event.key==='Enter')handleLogin()" />
          </div>
        </div>
        <div class="field">
          <div class="input-wrap">
            <span class="ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()" />
            <button class="toggle-pw" type="button" onclick="togglePw()" tabindex="-1">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="forgot-row">
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </div>
        <button class="btn btn-primary" onclick="handleLogin()">Log In</button>
      </div>

      <!-- ── QR PANEL ── -->
      <div class="qr-panel" id="qr-panel">
        <div class="qr-box">
          <div class="qr-placeholder" id="qr-placeholder">⏳</div>
          <img id="qr-image" src="" alt="QR Code" style="display:none;" />
          <p class="qr-instruction">
            <strong>Already logged in on your phone?</strong><br/>
            Open ImpulseCheck → tap your profile → tap <strong>"Approve QR Login"</strong> and scan this code.
          </p>
        </div>
        <div class="qr-status pending" id="qr-status">
          <span id="qr-status-dot">⏳</span>
          <span id="qr-status-text">Waiting for phone scan…</span>
        </div>
        <div class="qr-timer" id="qr-timer">Expires in <span id="qr-countdown">5:00</span></div>
        <button class="btn-refresh-qr" id="qr-refresh-btn" onclick="startQR()" style="display:none;">🔄 Generate New QR Code</button>
      </div>

      <div class="signup-row">Don't have an account? <a href="register.html">Sign Up</a></div>
    </div>
  </div>

  <script>
    /* ── EMAIL LOGIN ── */
    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Please fill in all fields.'); return; }
      try {
        const res  = await fetch('https://impulsecheck-backend.onrender.com/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          if (data.needs_verification) {
            sessionStorage.setItem('otp_user_id', data.user_id);
            sessionStorage.setItem('otp_email',   email);
            window.location.href = 'verify-otp.html';
            return;
          }
          showError(data.error); return;
        }
        loginSuccess(data.token, data.user);
      } catch (err) {
        showError('Cannot connect to server. Make sure the backend is running.');
      }
    }

    function loginSuccess(token, user) {
      localStorage.removeItem('ic_activity');
      localStorage.removeItem('ic_budget');
      localStorage.removeItem('ic_notifications');
      localStorage.removeItem('ic_categories');
      localStorage.setItem('ic_token',    token);
      localStorage.setItem('ic_user',     JSON.stringify(user));
      localStorage.setItem('ic_currency', user.currency || 'PHP');
      window.location.href = 'dashboard.html';
    }

    function togglePw() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      const b = document.getElementById('error-banner');
      b.textContent = msg; b.style.display = 'block';
    }

    /* ── TABS ── */
    function switchTab(tab) {
      document.getElementById('tab-email').classList.toggle('active', tab === 'email');
      document.getElementById('tab-qr').classList.toggle('active', tab === 'qr');
      document.getElementById('email-panel').style.display = tab === 'email' ? 'block' : 'none';
      document.getElementById('qr-panel').classList.toggle('visible', tab === 'qr');
      document.getElementById('error-banner').style.display = 'none';
      if (tab === 'qr' && !currentSessionId) startQR();
    }

    /* ── QR LOGIC ── */
    let currentSessionId = null;
    let pollInterval     = null;
    let timerInterval    = null;
    let expiresAt        = null;

    async function startQR() {
      clearInterval(pollInterval);
      clearInterval(timerInterval);
      currentSessionId = null;

      // Reset UI
      document.getElementById('qr-image').style.display       = 'none';
      document.getElementById('qr-placeholder').style.display = 'flex';
      document.getElementById('qr-placeholder').textContent   = '⏳';
      document.getElementById('qr-refresh-btn').style.display = 'none';
      setQRStatus('pending', '⏳', 'Waiting for phone scan…');

      try {
        const res  = await fetch('https://impulsecheck-backend.onrender.com/api/qrauth/generate', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');

        currentSessionId = data.sessionId;
        expiresAt = Date.now() + 5 * 60 * 1000;

        // Show QR image
        document.getElementById('qr-placeholder').style.display = 'none';
        const img = document.getElementById('qr-image');
        img.src = data.qrDataUrl;
        img.style.display = 'block';

        startCountdown();
        pollInterval = setInterval(pollStatus, 2000);
      } catch (err) {
        document.getElementById('qr-placeholder').textContent = '❌';
        setQRStatus('expired', '❌', 'Failed to generate QR. Try again.');
        document.getElementById('qr-refresh-btn').style.display = 'block';
      }
    }

    async function pollStatus() {
      if (!currentSessionId) return;
      try {
        const res  = await fetch(`https://impulsecheck-backend.onrender.com/api/qrauth/poll/${currentSessionId}`);
        const data = await res.json();

        if (data.status === 'approved') {
          clearInterval(pollInterval);
          clearInterval(timerInterval);
          setQRStatus('approved', '✅', 'Approved! Logging you in…');
          setTimeout(() => loginSuccess(data.token, data.user), 800);
        } else if (data.status === 'expired') {
          clearInterval(pollInterval);
          clearInterval(timerInterval);
          setQRStatus('expired', '❌', 'QR code expired.');
          document.getElementById('qr-refresh-btn').style.display = 'block';
        }
      } catch (err) {
        // silent — keep polling
      }
    }

    function startCountdown() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        const remaining = Math.max(0, expiresAt - Date.now());
        const m = Math.floor(remaining / 60000);
        const s = Math.floor((remaining % 60000) / 1000);
        document.getElementById('qr-countdown').textContent =
          m + ':' + String(s).padStart(2, '0');
        if (remaining <= 0) {
          clearInterval(timerInterval);
          clearInterval(pollInterval);
          setQRStatus('expired', '❌', 'QR code expired.');
          document.getElementById('qr-image').style.display       = 'none';
          document.getElementById('qr-placeholder').style.display = 'flex';
          document.getElementById('qr-placeholder').textContent   = '❌';
          document.getElementById('qr-refresh-btn').style.display = 'block';
        }
      }, 1000);
    }

    function setQRStatus(type, dot, text) {
      const el = document.getElementById('qr-status');
      el.className = 'qr-status ' + type;
      document.getElementById('qr-status-dot').textContent  = dot;
      document.getElementById('qr-status-text').textContent = text;
    }
  </script>
</body>
</html>
